services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    env_file:
      - myprofile_backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./myprofile_backend
    container_name: django-backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    restart: always
    env_file:
      - myprofile_backend/.env
    depends_on:
      - db
    ports:
      - "8017:8000"
    volumes:
      - ./myprofile_backend:/app
      - media_volume:/app/media

  frontend:
    build: ./frontend
    container_name: react-frontend
    restart: always
    env_file:
      - frontend/.env
    volumes:
      - frontend_build:/app/dist

volumes:
  postgres_data:
  frontend_build:
  media_volume: